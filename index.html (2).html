        // ==================== ГЕНЕРАЦИЯ РЫНКА ====================
        function generateMarket() {
            const sellers = ['🧑 Investor_42', '👩 Trader_Ann', '🧑 CryptoKing'];
            const items = [
                { name: '💎 Кристалл', count: [5, 20], priceBase: 20 },
                { name: '🏷️ Купон 5%', count: [1, 1], priceBase: 300 },
                { name: '🔑 Ключ', count: [1, 2], priceBase: 450 }
            ];
            marketLots = [];
            for (let i = 0; i < 6; i++) {
                const seller = sellers[Math.floor(Math.random() * sellers.length)];
                const item = items[Math.floor(Math.random() * items.length)];
                const count = Math.floor(Math.random() * (item.count[1] - item.count[0] + 1)) + item.count[0];
                const price = Math.floor(item.priceBase * count * (0.9 + Math.random() * 0.3));
                marketLots.push({ id: i, seller, item: item.name, count, price });
            }
        }

        function willBotBuy(itemName, pricePerUnit) {
            const range = marketPrices[itemName];
            if (!range) return false;
            if (pricePerUnit >= range.min && pricePerUnit <= range.max) {
                const position = (pricePerUnit - range.min) / (range.max - range.min);
                const chance = Math.max(0.3, 1 - position * 0.7);
                return Math.random() < chance;
            }
            return false;
        }

        function trySellToBots() {
            const soldLots = [];
            myLots = myLots.filter(lot => {
                const pricePerUnit = lot.price / lot.count;
                if (willBotBuy(lot.item, pricePerUnit)) {
                    balance += lot.price;
                    soldLots.push(lot);
                    return false;
                }
                return true;
            });
            if (soldLots.length > 0) {
                alert(`🎉 Боты купили ${soldLots.length} лотов на ${soldLots.reduce((s,l)=>s+l.price,0)} 🪙!`);
                updateAllBalances();
                if (currentPage === 'market') renderMarketContent();
            }
        }

        function createLot(itemType, count, price) {
            const pricePerUnit = price / count;
            const range = marketPrices[itemType];
            if (range && (pricePerUnit < range.min || pricePerUnit > range.max)) {
                alert(`Цена должна быть от ${range.min} до ${range.max} 🪙 за штуку!`);
                return false;
            }
            if (itemType === '💎 Кристалл') {
                if (inventory.crystals < count) { alert('Недостаточно кристаллов!'); return false; }
                inventory.crystals -= count;
            } else if (itemType === '🏷️ Купон 5%') {
                if (inventory.coupons.filter(c => c === '🏷️ Купон 5%').length < count) { alert('Недостаточно купонов!'); return false; }
                for (let i=0; i<count; i++) {
                    const idx = inventory.coupons.indexOf('🏷️ Купон 5%');
                    if (idx > -1) inventory.coupons.splice(idx, 1);
                }
            } else if (itemType === '🔑 Ключ') {
                if (inventory.keys.length < count) { alert('Недостаточно ключей!'); return false; }
                for (let i=0; i<count; i++) inventory.keys.pop();
            }
            myLots.push({ id: Date.now() + Math.random(), item: itemType, count, price });
            alert(`Лот выставлен!`);
            return true;
        }

                    <div class="card"><h4>📝 Учёт расходов</h4><p style="line-height:1.7; color:#CBD5E1">Веди учёт ежедневно, без пропусков. Разбей траты на категории: еда, транспорт, связь, развлечения, одежда, подарки. Анализируй расходы раз в неделю — это занимает всего 10 минут. Ты удивишься, сколько денег уходит на мелочи: снеки, подписки, импульсивные покупки. Оптимизируй эти статьи и направь сэкономленное в накопления.</p></div>
                    <div class="card"><h4>🛡️ Подушка безопасности</h4><p style="line-height:1.7; color:#CBD5E1">Это твой финансовый резерв на случай форс-мажора: потеря работы, болезнь, срочный ремонт. Оптимальный размер — 3-6 месяцев твоих обычных расходов. Храни эти деньги на накопительном счёте или вкладе с возможностью снятия без потери процентов. Не инвестируй подушку в акции — они могут упасть именно тогда, когда деньги срочно понадобятся.</p></div>
                    <div class="card"><h4>🎯 Финансовые цели</h4><p style="line-height:1.7; color:#CBD5E1">Ставь конкретные, измеримые цели с чёткими сроками. Короткие (1-3 месяца): новые наушники, игра, курс. Средние (3-12 месяцев): телефон, велосипед, мини-путешествие. Длинные (год и больше): ноутбук, первый инвестиционный портфель, крупная поездка. Запиши цель, сумму и срок — это повышает вероятность достижения в 10 раз!</p></div>
                    <div class="card"><h4>📈 Инфляция</h4><p style="line-height:1.7; color:#CBD5E1">Инфляция — это устойчивый рост цен на товары и услуги. В России она обычно составляет 5-10% в год. Если твои деньги просто лежат дома или на обычной карте, их покупательная способность падает: через год на ту же сумму ты купишь меньше. Чтобы сохранить и приумножить капитал, нужно инвестировать в инструменты с доходностью выше инфляции.</p></div>
                    <div class="card"><h4>🏦 Вклады</h4><p style="line-height:1.7; color:#CBD5E1">Вклад (депозит) — это деньги, которые ты передаёшь банку на определённый срок под процент. Ставка зависит от ключевой ставки ЦБ РФ. С 14 лет можно открыть вклад с письменного согласия родителей. Вклады до 1,4 млн рублей застрахованы государством (АСВ) — если банк закроется, деньги вернут.</p></div>
                    <div class="card"><h4>💳 Кредиты</h4><p style="line-height:1.7; color:#CBD5E1">Кредит — это деньги банка, которые ты обязуешься вернуть с процентами. Всегда смотри на полную стоимость кредита (ПСК) в процентах годовых, а не только на ежемесячный платёж. Не бери кредиты на развлечения, отпуск или гаджеты — это путь к долговой яме. Кредит оправдан только на то, что принесёт доход или на жизненно необходимое.</p></div>
                    <div class="card"><h4>📊 Акции</h4><p style="line-height:1.7; color:#CBD5E1">Акция — это ценная бумага, дающая право на долю в компании. Покупая акцию, ты становишься совладельцем бизнеса. Доход можно получить двумя способами: от роста курсовой стоимости (купил дешевле — продал дороже) и от дивидендов (часть прибыли, которую компания распределяет среди акционеров). Акции — высокорисковый инструмент.</p></div>
                    <div class="card"><h4>📜 Облигации</h4><p style="line-height:1.7; color:#CBD5E1">Облигация — это долговая расписка. Ты даёшь деньги в долг компании или государству, а они обязуются вернуть сумму с процентами (купонами) в определённый срок. Облигации надёжнее акций, но и доходность ниже. Самые безопасные — государственные облигации (ОФЗ).</p></div>
                    <div class="card"><h4>🧺 ETF и ПИФы</h4><p style="line-height:1.7; color:#CBD5E1">ETF (Exchange Traded Fund) — это биржевой фонд, который содержит корзину из множества акций или облигаций. Покупая одну акцию ETF, ты инвестируешь сразу в десятки или сотни компаний. Это готовая диверсификация. Для начинающего инвестора ETF на широкий рынок — оптимальный выбор.</p></div>
                    <div class="card"><h4>🥇 Драгметаллы</h4><p style="line-height:1.7; color:#CBD5E1">Золото, серебро, платина — это защитные активы, в которые инвесторы уходят во время кризисов и нестабильности. Золото не генерирует денежный поток (в отличие от бизнеса), его цена растёт только за счёт спроса. В долгосрочной перспективе золото проигрывает акциям по доходности, но служит хорошей страховкой портфеля.</p></div>
                    <div class="card"><h4>🏠 Недвижимость</h4><p style="line-height:1.7; color:#CBD5E1">Покупка недвижимости для сдачи в аренду или перепродажи — один из самых понятных способов инвестирования. Доход складывается из арендных платежей и роста стоимости самого объекта. Требует большого стартового капитала, но даёт стабильный пассивный доход. Можно инвестировать через фонды недвижимости (REIT).</p></div>
                    <div class="card"><h4>📉 Диверсификация</h4><p style="line-height:1.7; color:#CBD5E1">Не клади все яйца в одну корзину. Распределяй свои инвестиции по разным классам активов (акции, облигации, недвижимость, золото), по разным странам и валютам. Диверсификация снижает риск потери всего капитала при падении одного из активов.</p></div>
                    <div class="card"><h4>⚠️ Риски</h4><p style="line-height:1.7; color:#CBD5E1">Рыночный риск — цена актива может упасть. Кредитный риск — компания или государство может не вернуть долг по облигации. Валютный риск — изменение курса валюты влияет на стоимость зарубежных активов. Всегда оценивай свой риск-профиль перед инвестициями.</p></div>
                    <div class="card"><h4>🚫 Мошенники</h4><p style="line-height:1.7; color:#CBD5E1">Никогда не сообщай данные своей карты, CVV-код и коды из СМС. Не переходи по подозрительным ссылкам. Если звонят из «службы безопасности банка» и просят что-то сделать — клади трубку и перезванивай по официальному номеру. Слишком высокая доходность — признак мошенничества.</p></div>
                    <div class="card"><h4>🧾 Налоги</h4><p style="line-height:1.7; color:#CBD5E1">НДФЛ — 13% с большинства доходов. Налоговый вычет позволяет вернуть часть уплаченного налога за лечение, обучение, покупку жилья, а также при инвестировании через ИИС (Индивидуальный Инвестиционный Счёт).</p></div>
                    <div class="card"><h4>❄️ Сложный процент</h4><p style="line-height:1.7; color:#CBD5E1">Сложный процент — это начисление процентов не только на первоначальную сумму, но и на уже накопленные проценты. Формула: S = P × (1 + r)^n. Пример: 100 000 под 15% годовых через 20 лет превратятся в 1 636 653 рубля. Время — твой главный союзник. Начинай инвестировать как можно раньше!</p></div>
                    <div class="card"><h4>🏝️ Финансовая независимость</h4><p style="line-height:1.7; color:#CBD5E1">Финансовая независимость — это состояние, когда твой пассивный доход полностью покрывает все твои расходы. Ключевая концепция — правило 4%: ты можешь ежегодно тратить 4% от своего инвестиционного капитала. Твоя «цифра свободы» = годовые расходы × 25. Стремись к ней!</p></div>
                </div>`;
            } else {

        function renderMarketContent() {
            const container = document.getElementById('marketContent');
            if (!container) return;
            
            if (currentMarketTab === 'chests') {
                container.innerHTML = `<div class="grid">${chests.map(c => `<div class="chest-card" data-chest='${JSON.stringify(c)}'><div class="chest-icon">${c.name.split(' ')[0]}</div><h4>${c.name}</h4><p>${c.price} 🪙</p><button class="btn-small open-chest">Открыть</button></div>`).join('')}</div>`;
            } else if (currentMarketTab === 'market') {
                container.innerHTML = `<button class="btn btn-secondary" id="refreshMarket">🔄 Обновить</button>
                    <div class="grid">${marketLots.map(l => `<div class="card"><div>${l.seller}</div><div style="font-size:1.3rem">${l.item} x${l.count}</div><div class="income-badge">${l.price} 💎</div><button class="btn-small buy-lot" data-lot='${JSON.stringify(l)}'>Купить</button></div>`).join('')}</div>`;
            } else if (currentMarketTab === 'exchange') {
                container.innerHTML = `<div class="card">
                    <h3>Курс: 1 💎 = ${crystalToCoinRate} 🪙 (куп) / ${coinToCrystalRate} 🪙 (прод)</h3>
                    <p style="color:#EF4444">Комиссия обмена: 5%</p>
                    <h4>💎 → 🪙 Продать (комиссия 5%)</h4>
                    <input type="number" id="sellCrystals" value="1" min="1" max="${inventory.crystals}">
                    <p>Получите: <span id="sellResult">0</span> 🪙</p>
                    <button class="btn" id="sellCrystalsBtn">Продать</button>
                    <h4 style="margin-top:20px">🪙 → 💎 Купить</h4>
                    <input type="number" id="buyCrystals" value="1" min="1">
                    <p>Стоимость: <span id="buyResult">0</span> 🪙</p>
                    <button class="btn" id="buyCrystalsBtn">Купить</button>
                </div>`;
                setTimeout(() => {
                    const sellInput = document.getElementById('sellCrystals');
                    const buyInput = document.getElementById('buyCrystals');
                    if (sellInput) sellInput.addEventListener('input', () => {
                        document.getElementById('sellResult').textContent = Math.floor((parseInt(sellInput.value) || 0) * crystalToCoinRate * 0.95);
                    });
                    if (buyInput) buyInput.addEventListener('input', () => {
                        document.getElementById('buyResult').textContent = (parseInt(buyInput.value) || 0) * coinToCrystalRate;
                    });
                    document.getElementById('sellCrystalsBtn')?.addEventListener('click', () => {
                        const amt = parseInt(document.getElementById('sellCrystals').value) || 0;
                        if (amt > inventory.crystals) { alert('Недостаточно!'); return; }
                        inventory.crystals -= amt;
                        balance += Math.floor(amt * crystalToCoinRate * 0.95);
                        updateAllBalances(); render();
                    });
                    document.getElementById('buyCrystalsBtn')?.addEventListener('click', () => {
                        const amt = parseInt(document.getElementById('buyCrystals').value) || 0;
                        const cost = amt * coinToCrystalRate;
                        if (cost > balance) { alert('Недостаточно!'); return; }
                        balance -= cost;
                        inventory.crystals += amt;
                        updateAllBalances(); render();
                    });
                }, 50);
            } else if (currentMarketTab === 'inventory') {
                container.innerHTML = `<div class="card"><h3>💎 Кристаллы: ${inventory.crystals}</h3></div>
                    <div class="card"><h4>🏷️ Купоны</h4><p>${inventory.coupons.length ? inventory.coupons.join(', ') : 'Нет'}</p></div>
                    <div class="card"><h4>🔑 Ключи</h4><p>${inventory.keys.length ? inventory.keys.length+' шт.' : 'Нет'}</p></div>
                    <div class="card"><h4>🔐 VIP-ключи</h4><p>${inventory.vipKeys.length ? inventory.vipKeys.length+' шт.' : 'Нет'}</p></div>
                    <div class="card"><h4>📤 Выставить лот</h4>
                        <select id="sellItemType"><option value="💎 Кристалл">💎 Кристалл</option><option value="🏷️ Купон 5%">🏷️ Купон 5%</option><option value="🔑 Ключ">🔑 Ключ</option></select>
                        <input type="number" id="sellItemCount" placeholder="Количество" min="1" value="1">
                        <input type="number" id="sellItemPrice" placeholder="Общая цена в 🪙">
                        <button class="btn" id="createLotBtn">Выставить</button>
                    </div>`;
                document.getElementById('createLotBtn')?.addEventListener('click', () => {
                    const type = document.getElementById('sellItemType').value;
                    const count = parseInt(document.getElementById('sellItemCount').value) || 0;
                    const price = parseInt(document.getElementById('sellItemPrice').value) || 0;
                    if (createLot(type, count, price)) { renderMarketContent(); updateAllBalances(); }
                });
            } else if (currentMarketTab === 'myLots') {
                if (myLots.length === 0) container.innerHTML = `<div class="card"><p>У вас нет активных лотов</p></div>`;
                else container.innerHTML = `<div class="grid">${myLots.map(lot => `<div class="card"><h4>${lot.item} x${lot.count}</h4><p class="income-badge">${lot.price} 🪙</p><button class="btn-small btn-secondary cancel-lot" data-id="${lot.id}">Отменить</button></div>`).join('')}</div>`;
                document.querySelectorAll('.cancel-lot').forEach(b => b.addEventListener('click', () => {
                    const id = parseFloat(b.dataset.id);
                    const lot = myLots.find(l => l.id === id);
                    if (lot) {
                        if (lot.item === '💎 Кристалл') inventory.crystals += lot.count;
                        else if (lot.item === '🏷️ Купон 5%') for (let i=0; i<lot.count; i++) inventory.coupons.push('🏷️ Купон 5%');
                        else if (lot.item === '🔑 Ключ') for (let i=0; i<lot.count; i++) inventory.keys.push('🔑 Ключ');
                        myLots = myLots.filter(l => l.id !== id);
                        updateAllBalances(); renderMarketContent();
                    }
                }));
            }
            attachMarketEvents();
        }

        function openChest(chest) {
            if (balance < chest.price) { alert('Недостаточно!'); return; }
            balance -= chest.price;
            const rand = Math.random() * 100;
            let cum = 0, selected = chest.drops[0];
            for (const drop of chest.drops) { cum += drop.chance; if (rand < cum) { selected = drop; break; } }
            const count = Math.floor(Math.random() * (selected.max - selected.min + 1)) + selected.min;
            if (selected.item.includes('Кристалл')) { inventory.crystals += count; alert(`+${count} 💎`); }
            else if (selected.item.includes('Купон')) { for (let i=0; i<count; i++) inventory.coupons.push(selected.item); alert(selected.item); }
            else if (selected.item.includes('VIP')) { inventory.vipKeys.push(selected.item); alert('🔐 VIP-ключ!'); }
            else { for (let i=0; i<count; i++) inventory.keys.push('🔑 Ключ'); alert(`+${count} 🔑`); }
            updateAllBalances(); render();
        }

        function attachMarketEvents() {
            document.querySelectorAll('.open-chest').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); openChest(JSON.parse(b.closest('.chest-card').dataset.chest)); }));
            document.querySelectorAll('.chest-card').forEach(c => c.addEventListener('click', () => openChest(JSON.parse(c.dataset.chest))));
            document.querySelectorAll('.buy-lot').forEach(b => b.addEventListener('click', () => {
                const lot = JSON.parse(b.dataset.lot);
                if (crystals < lot.price) { alert('Недостаточно кристаллов!'); return; }
                crystals -= lot.price;
                if (lot.item.includes('Кристалл')) inventory.crystals += lot.count;
                else if (lot.item.includes('Купон')) for (let i=0; i<lot.count; i++) inventory.coupons.push(lot.item);
                else for (let i=0; i<lot.count; i++) inventory.keys.push('🔑 Ключ');
                marketLots = marketLots.filter(l => l.id !== lot.id);
                updateAllBalances(); render();
            }));
            document.getElementById('refreshMarket')?.addEventListener('click', () => { generateMarket(); renderMarketContent(); });
        }

        function drawChart() {
            const canvas = document.getElementById('priceChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const hist = assets[selectedAsset].history;
            ctx.clearRect(0, 0, 300, 150);
            if (hist.length < 2) return;
            const max = Math.max(...hist), min = Math.min(...hist), range = max - min || 1;
            ctx.beginPath(); ctx.strokeStyle = '#FBBF24'; ctx.lineWidth = 2;
            hist.forEach((p, i) => {
                const x = (i / (hist.length - 1)) * 300;
                const y = 150 - ((p - min) / range) * 130 - 10;
                i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            });
            ctx.stroke();
        }

        function updateAllBalances() {
            document.getElementById('mobileBalance').textContent = balance;
            document.getElementById('mobileCrystals').textContent = inventory.crystals;
            document.getElementById('mobileLevel').textContent = `Ур. ${level}`;
        }

        function attachEvents() {
            document.querySelectorAll('[data-page]').forEach(el => el.addEventListener('click', () => { currentPage = el.dataset.page; document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active')); el.classList.add('active'); render(); }));
            document.querySelectorAll('[data-go]').forEach(el => el.addEventListener('click', () => { currentPage = el.dataset.go; render(); }));
            document.querySelectorAll('.market-tab').forEach(t => t.addEventListener('click', () => { document.querySelectorAll('.market-tab').forEach(x => x.classList.remove('active')); t.classList.add('active'); currentMarketTab = t.dataset.mtab; renderMarketContent(); }));
            
            document.querySelectorAll('.buy-btn').forEach(b => b.addEventListener('click', () => { const k = b.dataset.k; if (balance >= assets[k].price) { balance -= assets[k].price; portfolio[k]++; render(); } }));
            document.querySelectorAll('.sell-btn').forEach(b => b.addEventListener('click', () => { const k = b.dataset.k; if (portfolio[k] > 0) { portfolio[k]--; balance += assets[k].price; render(); } }));
            document.getElementById('nextDayBtn')?.addEventListener('click', () => { day++; Object.keys(assets).forEach(k => { assets[k].price = Math.max(100, assets[k].price * (1 + (Math.random()*20-10)/100)); assets[k].history.push(assets[k].price); }); render(); });
            document.getElementById('assetSelect')?.addEventListener('change', e => { selectedAsset = e.target.value; drawChart(); });
            
            document.getElementById('startQuiz')?.addEventListener('click', () => {
                if (questionsToday >= 15) return;
                const grade = document.getElementById('qGrade').value;
                const subject = document.getElementById('qSubject').value;
                const qs = questionsDB[subject]?.[grade] || [{ q: '2+2?', o: ['3','4','5','6'], c: 1 }];
                currentQuiz.qs = [qs[Math.floor(Math.random() * qs.length)]];
                questionsToday++;
                render();
                setTimeout(() => {
                    const q = currentQuiz.qs[0];
                    document.getElementById('qOpts').innerHTML = q.o.map((o,i) => `<div class="quiz-option" data-opt="${i}">${o}</div>`).join('');
                    document.querySelectorAll('.quiz-option').forEach(el => el.addEventListener('click', e => {
                        const sel = parseInt(el.dataset.opt);
                        const correct = sel === q.c;
                        document.querySelectorAll('.quiz-option').forEach((o,i) => { o.classList.add('disabled'); if (i === q.c) o.classList.add('correct'); else if (i === sel) o.classList.add('wrong'); });
                        if (correct) { balance += 100; xp += 100; alert(`+100 🪙`); }
                        updateAllBalances();
                    }));
                }, 50);
            });
            
            document.querySelectorAll('.buy-re').forEach(b => b.addEventListener('click', () => { const i = JSON.parse(b.dataset.i); if (balance >= i.price) { balance -= i.price; empire.re.push(i); render(); } }));
            document.querySelectorAll('.buy-car').forEach(b => b.addEventListener('click', () => { const i = JSON.parse(b.dataset.i); if (balance >= i.price) { balance -= i.price; empire.cars.push(i); render(); } }));
            document.querySelectorAll('.buy-biz').forEach(b => b.addEventListener('click', () => { const i = JSON.parse(b.dataset.i); if (balance >= i.price) { balance -= i.price; empire.biz.push(i); render(); } }));
            document.getElementById('collectBtn')?.addEventListener('click', () => {
                const inc = empire.re.reduce((s,i)=>s+i.inc,0) + empire.cars.reduce((s,i)=>s+i.inc,0) + empire.biz.reduce((s,i)=>s+i.inc,0);
                if (inc === 0) alert('Нет дохода!');
                else if (Date.now() - lastCollect < 420000) alert('Раз в 7 минут!');
                else { balance += inc; lastCollect = Date.now(); render(); alert(`+${inc} 🪙`); }
            });
            
            document.querySelectorAll('.read-btn').forEach(b => b.addEventListener('click', function() { this.disabled = true; xp += 250; render(); }));
        }

        generateMarket();
        setInterval(trySellToBots, 30000);
        render();
    </script>
</body>
</html>
